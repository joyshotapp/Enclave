# ========================================================
# Nginx Gateway Configuration — Enclave (On-Premise)
# ========================================================
# Single-domain reverse proxy for Docker deployment.
# Used by docker-compose.prod.yml (mounted as default.conf).
#
# Features:
#   - Rate limiting
#   - Security headers
#   - API reverse proxy → backend (web:8000)
#   - SPA frontend → frontend container
#   - Grafana monitoring (optional, /grafana/)
# ========================================================

# ── Rate Limit Zones ──
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_chat:5m    rate=20r/m;
limit_req_zone $binary_remote_addr zone=api_auth:5m    rate=10r/m;

# ── Upstream Backends ──
upstream backend {
    server web:8000;
    keepalive 32;
}

upstream grafana {
    server grafana:3000;
}

# ========================================================
# Main Server — HTTP (port 80)
# ========================================================
# For on-prem LAN use, HTTP is fine. To enable HTTPS,
# uncomment the SSL server block below and redirect here.
# ========================================================
server {
    listen 80 default_server;
    server_name _;

    # ── Security Headers ──
    add_header X-Frame-Options        DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'" always;

    # ── Chat API — stricter rate limit ──
    location /api/v1/chat/ {
        limit_req zone=api_chat burst=5 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Block API docs & metrics from public traffic ──
    location = /docs { return 403; }
    location = /redoc { return 403; }
    location = /api/v1/openapi.json { return 403; }
    location = /metrics { return 403; }

    # ── Auth — rate limited ──
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── General API ──
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        client_max_body_size 50m;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Health check (no rate limit) ──
    location /health {
        proxy_pass http://backend;
    }

    # ── Grafana (optional) ──
    location /grafana/ {
        proxy_pass http://grafana/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana WebSocket (Live)
    location /grafana/api/live/ {
        proxy_pass http://grafana/api/live/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }

    # ── SPA Frontend (catch-all) ──
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static file caching ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ========================================================
# (Optional) HTTPS Server — uncomment to enable SSL
# ========================================================
# server {
#     listen 443 ssl http2;
#     server_name YOUR_DOMAIN;
#
#     ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#     ssl_session_cache   shared:SSL:10m;
#     ssl_session_timeout 1d;
#
#     # Copy all location blocks from the HTTP server above.
#     # Then change the HTTP server to redirect:
#     #   return 301 https://$host$request_uri;
# }

# ── Frontend upstream (used by proxy_pass) ──
upstream frontend {
    server frontend:80;
}
