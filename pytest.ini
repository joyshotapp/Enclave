[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --ignore=manual_test.py
    --ignore=test_api.py
    -v
markers =
    unit: 单元測試（無外部依賴）
    integration: 整合測試（需要 DB + Redis）
    e2e: 端對端測試（需要全部服務 + 真實 API Key）
    security: 證證與權限測試
